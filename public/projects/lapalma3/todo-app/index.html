<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive To-do App</title>
    <!-- Bootstrap 5 CSS CDN if using Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link
      href="https://sc-course-materials.s3.us-west-2.amazonaws.com/v2/vendor/bootstrap/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container my-5">
      <h1 class="text-center mb-4">Interactive To-do App</h1>
      <!-- Add Todo Form -->
      <div class="card mb-4">
        <div class="card-body">
          <h2 class="h4 mb-3">Add New To-do</h2>
          <form id="todoForm">
            <div class="mb-3">
              <label for="task" class="form-label">Task Description</label>
              <input type="text" class="form-control" id="task" required />
            </div>
            <div class="mb-3">
              <label for="dueDate" class="form-label">Due Date</label>
              <input type="date" class="form-control" id="dueDate" required />
            </div>
            <div class="mb-3 form-check">
              <input type="checkbox" class="form-check-input" id="completed" />
              <label class="form-check-label" for="completed">Completed</label>
            </div>
            <button type="submit" class="btn btn-primary">Add To-do</button>
          </form>
        </div>
      </div>
      <!-- Todo List -->
      <div class="card">
        <div class="card-body">
          <h2 class="h4 mb-3">To-do List</h2>
          <ul id="todoList" class="list-group"></ul>
        </div>
      </div>
      <!-- Log Area -->
      <div class="card mt-4">
        <div class="card-body">
          <h2 class="h4 mb-3">Activity Log</h2>
          <div id="log" class="log"></div>
        </div>
      </div>
    </div>

    <div id="modal" class="modal-overlay">
      <div class="modal-box">
        <button id="closeBtn" class="modal-close">×</button>
        <!-- Add Todo Form -->
        <div class="card mb-4">
          <div class="card-body">
            <h2 class="h4 mb-3">Update To-Do</h2>

            <div class="mb-3">
              <label for="task" class="form-label">Task Description</label>
              <input type="text" class="form-control" id="newTask" required />
            </div>
            <div class="mb-3">
              <label for="dueDate" class="form-label">Due Date</label>
              <input
                type="date"
                class="form-control"
                id="newDueDate"
                required
              />
            </div>
            <div class="mb-3 form-check">
              <label class="form-check-label" for="completed">Completed</label>
              <input
                type="checkbox"
                class="form-check-input"
                id="newCompleted"
              />
            </div>
            <button id="editId" class="btn btn-primary">Update</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap 5 JS CDN if using Bootstrap -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <!-- Axios CDN -->
    <script src="axios.min.js"></script>
    <script src="particle.js"></script>
    <!-- Custom JavaScript -->
    <script src="script.js"></script>
  </body>
</html>
