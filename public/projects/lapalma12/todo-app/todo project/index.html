<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Todo App</title>
    <!-- Bootstrap 5 CSS CDN if using Bootstrap -->

    <link
      href="https://sc-course-materials.s3.us-west-2.amazonaws.com/v2/vendor/bootstrap/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css"
    />

    <!-- Bootstrap Icons (optional) for Restricted Environment -->
    <link
      href="https://sc-course-materials.s3.us-west-2.amazonaws.com/v2/vendor/bootstrap/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="image-container">
      <div class="text">🗺 Odom Apps 📱</div>

      <div class="chip">
        <img src="assets/gwagon3.jpeg" alt="Person" width="96" height="96" />
        Dev Odom 📱
      </div>
    </div>

    <br />
    <div class="container my-2">
      <h1 class="glow">📝Tasks</h1>
      <!-- Add Todo Form -->
      <div class="card mb-4">
        <div class="card-body">
          <h2 class="h4 mb-3">🖊Add New Task</h2>
          <form id="todoForm">
            <div class="mb-3">
              <label for="task" class="form-label"> 📒Task Description</label>
              <input type="text" class="form-control" id="task" required />
            </div>
            <div class="mb-3">
              <label for="dueDate" class="form-label"> 📆Due Date</label>
              <input type="date" class="form-control" id="dueDate" required />
            </div>
            <div class="mb-3">
              <label for="time" class="form-label"> 🕝Time</label>
              <input type="time" class="form-control" id="time" required />
            </div>
            <div class="mb-3 form-check">
              <input
                type="checkbox"
                class="form-check-input"
                id="isCompleted"
              />
              <label class="form-check-label" for="isCompleted"></label>
            </div>
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-pencil"></i>Add Task
            </button>
          </form>
        </div>
      </div>
      <!-- Todo List -->
      <div class="card">
        <div class="card-body">
          <h2 class="h4 mb-3">📜Task List</h2>
          <ul id="todoList" class="list-group"></ul>
        </div>
      </div>
      <!-- Log Area -->
      <div class="card mt-4">
        <div class="card-body">
          <h2 class="h4 mb-3">🧾Activity Log</h2>
          <div id="log" class="log"></div>
        </div>
      </div>
    </div>

    <footer class="py-4 text-warning">
      <div class="container">
        <div class="row">
          <div class="col-md-6">
            <h3>2026 🗺 Odom Apps 📱</h3>
            <p class="text-danger">
              One of many more Apps to be created by a developer near you!
            </p>
          </div>
          <div class="col-md-6 text-md-end">
            <h3>Contact</h3>

            <a href="mailto:odom_apps_2026@myapps.com"
              >odom_apps_2026@myapps.com</a
            >
            <div class="icon-card">
              <i class="bi bi-facebook"></i
              ><a href="mailto:odom_apps_2026@facebook.com"
                >odom_apps_2026@facebook.com</a
              >
            </div>
          </div>
        </div>
        <hr class="my-3" />
        <h5 class="text-center text-white mb-0">
          &copy; 2026 🗺 Odom Apps 📱. All rights reserved.
        </h5>
      </div>
    </footer>

    <!-- Bootstrap JS Bundle for Restricted Environment -->
    <script src="https://sc-course-materials.s3.us-west-2.amazonaws.com/v2/vendor/bootstrap/bootstrap.bundle.min.js"></script>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
    <!-- Axios CDN -->
    <script src="axios.min.js"></script>
    <!-- Custom JavaScript -->
    <script src="script.js"></script>
  </body>
</html>
