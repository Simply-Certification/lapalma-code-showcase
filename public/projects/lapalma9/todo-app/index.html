<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Todo App</title>
    <!-- Bootstrap 5 CSS CDN if using Bootstrap -->
<!-- Bootstrap CSS for Restricted Environment -->
<link href="https://sc-course-materials.s3.us-west-2.amazonaws.com/v2/vendor/bootstrap/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons (optional) for Restricted Environment -->
<link href="https://sc-course-materials.s3.us-west-2.amazonaws.com/v2/vendor/bootstrap/bootstrap-icons.css" rel="stylesheet">


    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
 
 <div class="stars"></div>

<ul id="list"></ul>



    <div class="container my-5">
      <h1 class="text-center mb-4">Interactive Todo App</h1>
      <!-- Add Todo Form -->
      <div class="card id=topCard mb-4">
        <div class="card-body">
          <h2>Add New Todo</h2>
          <form id="todoForm">
            <div class="mb-3">
                 <!-- <input id="task" placeholder="New task"> -->

              <!-- <label for="task" class="form-label">Task Description</label> -->
              <input type="text" placeholder="New task" class="form-control" id="task" required />
            </div>
            <div class="mb-3">
              <label for="dueDate" class="form-label">Due Date</label>
              <input type="date" class="form-control" id="dueDate" required />
            </div>
            <div class="mb-3 form-check">
              <input type="checkbox" class="form-check-input" id="isCompleted" />
              <label class="form-check-label" for="isCompleted">Completed</label>
            </div>
            <!-- <button onclick="addTask()">Add</button> -->
            <button hover type="submit"  class="button button2">&#9997</button>

            <!-- <button type="submit" class="btn btn-primary">Add Todo</button> -->
          </form>
        </div>
      </div>
    
      <!-- Todo List -->
      <div class="card">
        <div class="card-body">
          <h2 class="h4 mb-3">Todo List</h2>
    
         <!-- <button onclick="clearAll()" class="button button2" >Clear All</button> -->
           <details id="myDetails" class="more">
          <!-- <input type="checkbox" id="taskList"> -->
<label for="taskList">
          <ul id="todoList" class="list-group"></ul>
        </label><div>
         
            
        </div>
        </details>
        </div>
      </div>
      <!-- Log Area -->
      <div class="card mt-4">
        <div class="card-body">
          <h2 class="h4 mb-3">Activity Log</h2>
          <div id="log" class="log"></div>

        </div>
      </div>
      <div id="modal" class="modal-overlay">
  <div class="modal-box">
    <button id="closeBtn" class="modal-close">×</button>
          <!-- Edit Todo Form -->
      <div class="card mb-4">
        <div class="card-body">
          <h2 class="h4 mb-3">Edit ToDo</h2>
          <!-- <form id="newTodoForm"> -->
            <div class="mb-3">
              <label for="task" class="form-label">Task Description</label>
              <input type="text" class="form-control" id="newTask" required />
            </div>
            <div class="mb-3">
              <label for="dueDate" class="form-label">Due Date</label>
              <input type="date" class="form-control" id="newDueDate" required />
            </div>
            <div class="mb-3 form-check">
              <input type="checkbox" class="form-check-input" id="newCompleted" />
              <label class="form-check-label" for="completed">Completed</label>
            </div>
            <button id="editId" class="button3">Update</button>
          <!-- </form> -->
        </div>
      </div>
    </div>
  </div>
</div>
    

    <!-- Bootstrap 5 JS CDN if using Bootstrap -->
  <!-- Bootstrap JS Bundle for Restricted Environment -->
<script src="https://sc-course-materials.s3.us-west-2.amazonaws.com/v2/vendor/bootstrap/bootstrap.bundle.min.js"></script>
    <!-- Axios CDN -->
    <script src="axios.min.js"></script>
    <!-- Custom JavaScript -->
    <script src="script.js"></script>
  </body>
</html>
