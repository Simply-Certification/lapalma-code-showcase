<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Todo App</title>
    <!-- Bootstrap 5 CSS CDN if using Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link
      href="https://sc-course-materials.s3.us-west-2.amazonaws.com/v2/vendor/bootstrap/bootstrap-icons.css"
      rel="stylesheet"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="grab container my-5">
      <h1 class="text-center mb-4">Interactive Todo App</h1>
      <!-- Add Todo Form -->
      <div class="card mb-4">
        <div class="card-body">
          <h2 class="h4 mb-3">Add New tasks</h2>
          <form id="todoForm">
            <div class="mb-3">
              <label for="task" class="form-label">Task Description</label>
              <input type="text" class="form-control bg-danger" id="task" required />
            </div>
            <div class="mb-3">
              <label for="dueDate" class="form-label">Due Date</label>
              <input type="date" class="form-control bg-danger" id="dueDate" required />
            </div>
            <div class="mb-3 form-check">
              <input type="checkbox" class="form-check-input" id="completed" />
              <label class="form-check-label bg-warning" for="completed">Completed</label>
            </div>
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-download"></i> Add
            </button>
          </form>
        </div>
      </div>
      <!-- Todo List -->
      <div class="card">
        <div class="card-body">
          <h2 class="h4 mb-3">Task List</h2>
          <ul id="todoList" class="list-group"></ul>
        </div>
      </div>
      <!-- Log Area -->
      <div class="card mt-4 mb-4">
        <div class="card-body">
          <h2 class="h4 mb-3">Activity Log</h2>
          <div id="log" class="log"></div>
        </div>
      </div>
    </div>
    <!-- Bootstrap 5 JS CDN if using Bootstrap -->
    
    <footer class="py-1 bg-warnig text-neutral-300 text-xs sticky top-[100vh]">
      <div class="mx-auto max-w-screen-2xl px-3">
        © 2026 Deshon Carter Coding <span class="inline-block mx-3">—</span
        ><a
          href="https://simplycodingcourses.com/privacy-policy"
          target="_blank"
          class="hover:underline"
          >Privacy Policy</a
        >
        <div
          class="inline-block align-middle border-r border-r-neutral-600 mx-3"
        >
          &nbsp;
        </div>
        <a
          href="https://simplycodingcourses.com/terms-of-service"
          target="_blank"
          class="hover:underline"
          >Terms of Service</a
        >
      </div>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <!-- Axios CDN -->
    <script src="axios.min.js"></script>
    <!-- Custom JavaScript -->
    <script src="script.js"></script>
  </body>
</html>
