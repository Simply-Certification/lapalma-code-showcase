<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Todo App</title>
    <!-- Bootstrap 5 CSS CDN if using Bootstrap -->
    <link href="https://sc-course-materials.s3.us-west-2.amazonaws.com/v2/vendor/bootstrap/bootstrap.min.css"
      rel="stylesheet">
    <!-- Bootstrap Icons for Restricted Environment -->
<link href="https://sc-course-materials.s3.us-west-2.amazonaws.com/v2/vendor/bootstrap/bootstrap-icons.css" rel="stylesheet">  
 
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css" />
    <link href="googlefonts/lobster.css"  rel="stylesheet">  
  </head>
  <body>
    <div class="container my-5">
      <h1 class="text-center mb-4">Interactive Task List App</h1>
      <!-- Add Todo Form -->
      <div class="card mb-4">
        <div class="card-body">
          <h2 class="h2 mb-3" id="addTask">Add Task</h2>
          <form id="todoForm">
            <div class="mb-3">
              <label for="task" class="form-label">Task Description</label>
              <input type="text" class="form-control" id="task" required />
            </div>
            <div class="mb-3">
              <label for="dueDate" class="form-label">Due Date</label>
              <input type="date" class="form-control" id="dueDate" required />
            </div>
            <!-- <div class="mb-3">
              <label for="time" class="form-label">Time</label>
              <input type="time" class="form-control" id="time">
            </div> -->
            <div class="mb-3 form-check">
              <input type="checkbox" class="form-check-input" id="completed" />
              <label class="form-check-label" for="completed">Completed</label>
            </div>
            <button type="submit" class="btn btn-primary bi-save" id="formSubmitBtn" > Add Task</button>
            <button class="btn btn-primary bi-pencil-square" style="display:none" id="editTodoBtn"> Edit Task</button>
          </form>
        </div>
      </div>
      <!-- Todo List -->
      <div class="card" id="todoCard">
        <div class="card-body">
          <div class="d-flex justify-content-between h2 mb-2">Task List 
            <button class="btn btn-secondary btn-sm" type="button" id="showList">Show/Hide</button>
          </div>
        </div> 
          <ul id="todoList" class="list-group" style="display:none;"></ul>
        </div>
      </div>
      <!-- Log Area -->
      <div class="card mt-4" id="logCard">
        <div class="card-body">
          <div class="d-flex justify-content-between h2 mb-2">Activity Log
            <button class="btn btn-secondary btn-sm" type="button" id="showList2">Show/Hide</button>
          </div>
          </div>  
          <div id="log" class="log" style="display:none;">
            
        </div>
      </div>
    </div>
    <!-- Bootstrap 5 JS CDN if using Bootstrap -->
  <script
     src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
      
    <!-- Axios CDN -->
    <script src="axios.min.js"></script>
    <script src="utils.js"></script>
    <script src="script.js"></script>
    <!-- Custom JavaScript -->
  </body>
</html>
