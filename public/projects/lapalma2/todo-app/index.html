<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Todo App</title>
    <!-- Bootstrap 5 CSS CDN if using Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="googleFonts/lobster.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link
      href="https://sc-course-materials.s3.us-west-2.amazonaws.com/v2/vendor/bootstrap/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container my-5">
      <h1 class="text-center mb-4">Interactive Todo App</h1>
      <!-- Add Todo Form -->
      <div class="card mb-4">
        <div class="card-body">
          <h2 class="h4 mb-3">Add New Todo</h2>
          <form id="todoForm">
            <div class="mb-3">
              <label for="task" class="form-label">Task Description</label>
              <input
                type="text"
                class="form-control blue-box"
                id="task"
                required
              />
            </div>
            <div class="mb-3">
              <label for="dueDate" class="form-label">Due Date</label>
              <input
                type="date"
                class="form-control blue-box"
                id="dueDate"
                required
              />
            </div>
            <div class="mb-3 form-check">
              <label class="form-check-label" for="completed">Completed</label>
              <input type="checkbox" class="form-check-input" id="completed" />
            </div>
            <button type="submit" class="btn btn-primary">Add Todo</button>
          </form>
        </div>
      </div>
      <!-- Todo List -->
      <div class="card">
        <div class="card-body">
          <h2 class="h4 mb-3">Todo List</h2>
          <ul id="todoList" class="list-group"></ul>
        </div>
      </div>
      <!-- Log Area -->
      <div class="card mt-4">
        <div class="card-body">
          <h2 class="h4 mb-3">Activity Log</h2>
          <div id="log" class="log"></div>
        </div>
      </div>
    </div>

    <div id="modal" class="modal-overlay">
      <div class="modal-box">
        <button id="closeBtn" class="modal-close">×</button>
        <!-- Add Todo Form -->
        <div class="card mb-4">
          <div class="card-body">
            <h2 class="h4 mb-3">Update ToDo</h2>
            <!-- <form id="newTodoForm"> -->
            <div class="mb-3">
              <label for="task" class="form-label">Task Description</label>
              <input type="text" class="form-control" id="newTask" required />
            </div>
            <div class="mb-3">
              <label for="dueDate" class="form-label">Due Date</label>
              <input
                type="date"
                class="form-control"
                id="newDueDate"
                required
              />
            </div>
            <div class="mb-3 form-check">
              <label class="form-check-label" for="completed">Completed</label>
              <input
                type="checkbox"
                class="form-check-input"
                id="newCompleted"
              />
            </div>
            <button id="editId" class="btn btn-primary">Update</button>
            <!-- </form> -->
          </div>
        </div>
      </div>
    </div>

    <footer class="footer">
      <div class="footer-content">
        <div class="footer-section">
          <div class="container d-flex">
            <div class="row">
              <div class="col-12">
                <h2>Follow us at:</h2>
              </div>
              <div class="col-sm-2">
                <button class="btn btn-light m-2">
                  <a href="www.twitter.com"><p class="bi-twitter text-primary text-center h4"></p></a>
                </button>
              </div>
              <div class="col-sm-2">
                <button class="btn btn-light m-2">
                   <a href="www.instagram.com"><p class="bi-instagram text-warning text-center h4"></p></a>
                </button>
              </div>
              <div class="col-sm-2">
                <button class="btn btn-light m-2">
                  <a href="www.linkedin.com"><p class="bi-linkedin text-info text-center h4"></p></a>
                </button>
              </div>
              <div class="col-sm-2">
                <button class="btn btn-light m-2">
                  <a href="www.google.com"><p class="bi-google text-danger text-center h4"></p></a>
                </button>
              </div>
              <div class="col-sm-2">
                <button class="btn btn-light m-2">
                  <a href="www.facebook.com"><p class="bi-facebook text-primary text-center h4"></p></a>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <!-- Bootstrap 5 JS CDN if using Bootstrap -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <!-- Axios CDN -->
    <script src="axios.min.js"></script>
    <!-- Custom JavaScript -->
    <script src="script.js"></script>
  </body>
</html>
