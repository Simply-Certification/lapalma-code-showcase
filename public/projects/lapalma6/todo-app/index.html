<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Todo App</title>
    <!-- Bootstrap 5 CSS CDN if using Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <button class="btn btn-outline-secondary" id="darkModeToggle" >Toggle Dark Mode</button>
    <div class="container my-5">
      <h1 class="text-center mb-4">Interactive Todo App</h1>
      <!-- Add Todo Form -->
      <div class="card mb-4">
        <div class="card-body">
          <h2 class="h4 mb-3">Add New Todo</h2>
          <form id="todoForm">
            <div class="mb-3">
              <label for="task" class="form-label">Task Description</label>
              <input type="text" class="form-control" id="task" required />
            </div>
            <div class="mb-3">
              <label for="dueDate" class="form-label">Due Date</label>
              <!-- <input type="date" class="form-control" id="dueDate" required /> -->
              <input type="text" class="form-control" id="dueDate" placeholder="Select a Date"/>
            </div>
            <div class="mb-3 form-check">
              <input type="checkbox" class="form-check-input" id="completed" />
              <label class="form-check-label" for="completed">Completed</label>
            </div>
            <button type="submit" class="btn btn-outline-primary" id="formSubmitBtn" >Add Todo</button>
            <button class="btn btn-outline-primary" style="display:none" id="editTodoBtn">Edit Todo</button>
            
          </form>
        </div>
      </div>
      <!-- Todo List -->
      <div class="card" id="todoCard">
        <div class="card-body">
          <h2 class="h4 mb-3 " id="todoListHeader">Todo List</h2>
          <div class="filterTextBoxContainer"><input id="filterByText" class="form-control " placeholder="Filter text..."></div>
          <button id="sortByDate" class="btn btn-outline-primary" onclick="sortByDateHandler()">Sort By Date</button>
          <button id="sortByCompleted" class="btn btn-outline-primary" onclick="sortByCompletedHandler()">Sort By Completed</button>
          
          <ul id="todoList" class="list-group" style="display:block;"></ul>
        </div>
      </div>
      <!-- Log Area -->
      <div class="card mt-4" id="logCard">
        <div class="card-body">
          <h2 class="h4 mb-3">Activity Log</h2>
          <div id="log" class="log" style="display:none;"></div>
        </div>
      </div>
    </div>
    <!-- Bootstrap 5 JS CDN if using Bootstrap -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"></script>
    <!-- Axios CDN -->
    <script src="axios.min.js"></script>
    <script src="darkMode.js"></script>
    <script src="sortingFunctions.js"></script>
    <script src="utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <script src="script.js"></script>

    <!-- Custom JavaScript -->
  </body>
</html>
